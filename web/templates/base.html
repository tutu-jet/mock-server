<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}mock-server{% endblock %}</title>
<link rel="stylesheet" href="/static/app.css">
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
</head>
<body>
<aside class="sidebar">
  <div class="brand">
    <div class="logo">M</div>
    <div>
      <div class="brand-title">mock-server</div>
      <div class="brand-sub">代理 9077 · UI 9088</div>
    </div>
  </div>
  <nav>
    <a href="/rules" class="nav-item {% if active_tab=='rules' %}active{% endif %}">规则</a>
    <a href="/flows" class="nav-item {% if active_tab=='flows' %}active{% endif %}">流量</a>
    <a href="/help" class="nav-item {% if active_tab=='help' %}active{% endif %}">帮助</a>
  </nav>
</aside>

<main class="main">
  <header class="page-header">
    <h1>{% block heading %}{% endblock %}</h1>
    <p class="subtitle">{% block subtitle %}{% endblock %}</p>
  </header>
  {% block content %}{% endblock %}
</main>

<div id="toast-container" class="toast-container"></div>
<div id="drawer-root"></div>

<script>
// 全局 toast：监听 HX-Trigger 中的 toast 事件
document.body.addEventListener("toast", e => {
  const {kind = "info", msg} = e.detail;
  const el = document.createElement("div");
  el.className = `toast toast-${kind}`;
  el.textContent = msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => el.classList.add("show"), 10);
  setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 300); }, 3000);
});

// 抽屉关闭：点击遮罩
document.body.addEventListener("click", e => {
  if (e.target.classList.contains("drawer-overlay")) {
    document.getElementById("drawer-root").innerHTML = "";
  }
});
// ESC 关抽屉
document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.getElementById("drawer-root").innerHTML = "";
});

// 复制流量原始 body
async function copyFlowBody(flowId, kind, btn) {
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "...";
  try {
    const resp = await fetch(`/flows/${flowId}/body/${kind}?inline=1`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    await navigator.clipboard.writeText(text);
    btn.textContent = "已复制";
    document.body.dispatchEvent(new CustomEvent("toast", {detail: {kind: "info", msg: `已复制 ${text.length} 字符`}}));
  } catch (e) {
    btn.textContent = "失败";
    document.body.dispatchEvent(new CustomEvent("toast", {detail: {kind: "error", msg: `复制失败: ${e.message}`}}));
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 1500);
  }
}

// 拉取流量完整 body 并填入规则表单的 textarea（从流量保存为规则 - 截断场景）
async function copyFlowBodyToTextarea(flowId, kind, btn) {
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "...";
  try {
    const resp = await fetch(`/flows/${flowId}/body/${kind}?inline=1`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const ta = document.getElementById("rule-form-body");
    if (!ta) throw new Error("未找到 textarea");
    ta.value = text;
    btn.textContent = "已填入";
    document.body.dispatchEvent(new CustomEvent("toast", {detail: {kind: "success", msg: `已填入完整 body（${text.length} 字符）`}}));
  } catch (e) {
    btn.textContent = "失败";
    document.body.dispatchEvent(new CustomEvent("toast", {detail: {kind: "error", msg: `填入失败: ${e.message}`}}));
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 1500);
  }
}

// URL chip popover（baseurl / query）单例
(function() {
  let pop = null;
  let activeChip = null;

  function ensurePop() {
    if (pop) return pop;
    pop = document.createElement("div");
    pop.className = "url-popover";
    pop.innerHTML = `
      <div class="url-popover-head">
        <span class="url-popover-label"></span>
        <button type="button" class="url-popover-copy">复制</button>
      </div>
      <div class="url-popover-value"></div>
    `;
    document.body.appendChild(pop);
    pop.addEventListener("click", e => e.stopPropagation());
    pop.querySelector(".url-popover-copy").addEventListener("click", async (e) => {
      const btn = e.currentTarget;
      const val = pop.querySelector(".url-popover-value").textContent;
      const orig = btn.textContent;
      try {
        await navigator.clipboard.writeText(val);
        btn.textContent = "已复制";
      } catch {
        btn.textContent = "失败";
      }
      setTimeout(() => { btn.textContent = orig; }, 1200);
    });
    return pop;
  }

  function closePop() {
    if (!pop) return;
    pop.classList.remove("show");
    if (activeChip) { activeChip.classList.remove("active"); activeChip = null; }
  }

  function openPop(chip) {
    const p = ensurePop();
    p.querySelector(".url-popover-label").textContent = chip.dataset.popoverLabel || "";
    p.querySelector(".url-popover-value").textContent = chip.dataset.popoverValue || "";
    p.classList.add("show");
    // 定位：chip 左下方，溢出右边时贴右边
    const r = chip.getBoundingClientRect();
    p.style.top = (r.bottom + 4) + "px";
    p.style.left = "0px";
    p.style.right = "auto";
    const pr = p.getBoundingClientRect();
    let left = r.left;
    if (left + pr.width > window.innerWidth - 12) {
      left = window.innerWidth - pr.width - 12;
    }
    if (left < 12) left = 12;
    p.style.left = left + "px";
    if (activeChip) activeChip.classList.remove("active");
    activeChip = chip;
    chip.classList.add("active");
  }

  document.addEventListener("click", e => {
    const chip = e.target.closest(".flow-chip");
    if (chip) {
      e.preventDefault();
      e.stopPropagation();
      if (activeChip === chip) { closePop(); }
      else { openPop(chip); }
      return;
    }
    if (pop && pop.contains(e.target)) return;
    if (pop && pop.classList.contains("show")) closePop();
  }, true);
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closePop();
  });
  window.addEventListener("scroll", closePop, true);
  window.addEventListener("resize", closePop);
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
