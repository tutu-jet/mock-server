<div class="rule-card {% if not rule.enabled %}disabled{% endif %}" id="rule-{{ rule.id }}">
  <div class="rule-head">
    <span class="method method-{{ rule.method|lower if rule.method != '*' else 'any' }}">{{ rule.method }}</span>
    <span class="rule-name" title="{{ rule.name }}">{{ rule.name }}</span>
    <label class="switch">
      <input type="checkbox" {% if rule.enabled %}checked{% endif %}
             hx-post="/rules/{{ rule.id }}/toggle"
             hx-target="#rule-{{ rule.id }}"
             hx-swap="outerHTML">
      <span class="slider"></span>
    </label>
  </div>
  <div class="rule-url">{{ rule.url_pattern }}</div>
  <div class="rule-foot">
    <span class="muted">状态</span>
    <span class="status status-{{ rule.status_code // 100 }}xx">{{ rule.status_code }}</span>
    <span class="muted">命中</span>
    <span>{{ rule.match_count }}</span>
    <span class="spacer"></span>
    <button class="icon-btn"
            hx-get="/rules/{{ rule.id }}/edit"
            hx-target="#drawer-root"
            hx-swap="innerHTML"
            title="编辑">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </button>
    <button class="icon-btn icon-btn-danger"
            hx-delete="/rules/{{ rule.id }}"
            hx-target="#rule-{{ rule.id }}"
            hx-swap="delete"
            hx-confirm="确认删除「{{ rule.name }}」？此操作不可恢复。"
            title="删除">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
  </div>
</div>
