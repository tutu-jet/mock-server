{# 规则表单字段，新建 / 编辑共用 #}
<div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
    <label class="block">
        <span class="text-xs text-slate-500">名称</span>
        <input name="name" required value="{{ rule.name if rule else '' }}"
               class="mt-1 w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-slate-500">
    </label>
    <label class="block sm:col-span-2">
        <span class="text-xs text-slate-500">URL 匹配（fnmatch glob，如 <code>*httpbin.org/get*</code>）</span>
        <input name="url_pattern" required value="{{ rule.url_pattern if rule else '' }}"
               class="mt-1 w-full border border-slate-300 rounded px-2 py-1.5 text-sm font-mono focus:outline-none focus:border-slate-500">
    </label>
    <label class="block">
        <span class="text-xs text-slate-500">Method</span>
        <select name="method"
                class="mt-1 w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-slate-500">
            {% for m in allowed_methods %}
            <option value="{{ m }}" {% if rule and rule.method==m or not rule and m=='*' %}selected{% endif %}>{{ m }}</option>
            {% endfor %}
        </select>
    </label>
    <label class="block">
        <span class="text-xs text-slate-500">Status</span>
        <input type="number" name="status_code" required value="{{ rule.status_code if rule else 200 }}"
               class="mt-1 w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-slate-500">
    </label>
    <label class="block">
        <span class="text-xs text-slate-500">启用</span>
        <select name="enabled"
                class="mt-1 w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-slate-500">
            <option value="1" {% if not rule or rule.enabled %}selected{% endif %}>是</option>
            <option value="0" {% if rule and not rule.enabled %}selected{% endif %}>否</option>
        </select>
    </label>
</div>
<label class="block">
    <span class="text-xs text-slate-500">Response Headers (JSON 对象，如 <code>{"X-Mock":"1"}</code>)</span>
    <textarea name="response_headers" rows="2"
              class="mt-1 w-full border border-slate-300 rounded px-2 py-1.5 text-sm font-mono focus:outline-none focus:border-slate-500">{{ rule.response_headers if rule else '{}' }}</textarea>
</label>
<label class="block">
    <span class="text-xs text-slate-500">Response Body</span>
    <textarea name="response_body" rows="6"
              class="mt-1 w-full border border-slate-300 rounded px-2 py-1.5 text-sm font-mono focus:outline-none focus:border-slate-500">{{ rule.response_body if rule else '' }}</textarea>
</label>
