<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}mock-server{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
<header class="bg-white border-b border-slate-200">
    <nav class="max-w-6xl mx-auto px-4 h-14 flex items-center gap-6">
        <a href="/" class="font-semibold text-lg">mock-server</a>
        <a href="/rules" class="text-sm hover:text-slate-900 {% if active=='rules' %}text-slate-900 font-medium{% else %}text-slate-500{% endif %}">规则</a>
        <a href="/flows" class="text-sm hover:text-slate-900 {% if active=='flows' %}text-slate-900 font-medium{% else %}text-slate-500{% endif %}">流量</a>
        <span class="ml-auto text-xs text-slate-400">代理 :9077 / UI :9088</span>
    </nav>
</header>
<main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
</main>
</body>
</html>
